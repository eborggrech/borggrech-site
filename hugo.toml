baseURL = "https://borggrech.com/"
languageCode = "en-us"
title = "Edward Borg Grech"
theme = "PaperMod"

[params]
  author = "Edward Borg Grech"
  description = "Founder, operator and technologist writing about enterprise AI, accountable autonomy, building technology businesses and Europe's AI transition."
  keywords = ["Edward Borg Grech", "Bluefort", "enterprise AI", "accountable autonomy", "technology", "Malta", "Europe"]
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = false
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = false
  tocopen = false
  mainSections = []

[fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  location = 0
  distance = 1000
  threshold = 0.4
  minMatchCharLength = 0
  limit = 10 # refer: https://www.fusejs.io/api/methods.html#search
  keys = ["title", "permalink", "summary", "content"]

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1

  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 2

  [[menu.main]]
    name = "Writing"
    url = "/thoughts/"
    weight = 3

  [[menu.main]]
    name = "Now"
    url = "/now/"
    weight = 4

[outputs]
  home = ["HTML", "RSS", "JSON"]

